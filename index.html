<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abduvohidov | Telegram Profile</title>
    <meta name="description" content="Abduvohidovning shaxsiy sahifasi va Telegram havolasi.">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-animation">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <main class="container">
        <div class="glass-card">
            <div class="profile-header">
                <div class="avatar-container">
                    <img src="avatar.png" alt="Ibrohim" id="avatar">
                    <div class="status-dot"></div>
                </div>
                <h1>Abduvohidov</h1>
            </div>

            <div class="links-section">
                <a href="https://t.me/i_abduvohidov" target="_blank" class="link-item telegram">
                    <div class="icon">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.894 8.221l-1.97 9.28c-.145.658-.537.818-1.084.508l-3-2.21-1.446 1.394c-.14.14-.26.26-.526.26l.216-3.047 5.545-5.01c.24-.214-.053-.333-.374-.12l-6.85 4.31-2.955-.924c-.642-.204-.654-.642.135-.954l11.554-4.45c.535-.195 1.002.13 1.002.13l-.152.823z"/>
                        </svg>
                    </div>
                    <span>Telegram orqali bog'lanish</span>
                    <div class="arrow">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14m-7-7l7 7-7 7"/></svg>
                    </div>
                </a>
            </div>
        </div>
    </main>

    <script src="main.js"></script>
</body>
</html>
